name: Lab request
description: Request a hands-on lab.
title: "[Lab]: "
labels: ["lab"]
body:
  - type: textarea
    id: lesson
    attributes:
      label: What system design lesson should this lab teach?
    validations:
      required: true
  - type: textarea
    id: artifact
    attributes:
      label: What should learners build or run?
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: How should the lab be validated?
      description: Include expected output, metrics, tests, or review criteria.
    validations:
      required: true
